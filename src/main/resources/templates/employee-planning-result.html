<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Planning Result - [[${planOrderId}]]</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --ink: #0f1b2d;
            --muted: #5c6b7a;
            --primary: #1f5fbf;
            --primary-deep: #174a92;
            --accent: #0aa6a6;
            --line: #e5ebf3;
            --shadow: 0 10px 30px rgba(12, 31, 63, 0.08);
            --success: #1e8e5a;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            color: var(--ink);
            background: var(--bg);
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--panel);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
        }

        .header {
            border-bottom: 2px solid var(--bg);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-deep);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .meta-item label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .meta-item span {
            font-weight: 600;
            font-size: 15px;
        }

        .table-wrap {
            overflow: auto;
            max-height: 480px;
            border-radius: 12px;
            border: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #f8fbff;
            text-align: left;
            padding: 14px;
            border-bottom: 2px solid var(--line);
            color: var(--primary-deep);
            font-weight: 700;
        }

        tbody td {
            padding: 14px;
            border-bottom: 1px solid var(--bg);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            background: #e9f5ff;
            color: var(--primary);
        }

        .status-completed {
            background: #eafaf1;
            color: var(--success);
        }

        .no-print {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                padding: 0;
                background: white;
            }

            .container {
                box-shadow: none;
                border: none;
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Production Planning Result</h1>
            <div class="meta-grid">
                <div class="meta-item">
                    <label>Order ID</label>
                    <span th:text="${planOrderId}">O2D-0000</span>
                </div>
                <div class="meta-item">
                    <label>Customer Name</label>
                    <span th:text="${customerName}">-</span>
                </div>
                <div class="meta-item">
                    <label>Company Name</label>
                    <span th:text="${companyName}">-</span>
                </div>
                <div class="meta-item">
                    <label>Planning Start</label>
                    <span th:text="${planningStart}">-</span>
                </div>
                <div class="meta-item">
                    <label>Time Stamp</label>
                    <span th:text="${submittedAt}" style="font-size:13px;color:#1e3a4a;">-</span>
                </div>
            </div>
        </div>

        <div th:if="${error}"
            style="padding: 20px; background: #fff1f1; border-radius: 10px; color: #c0392b; font-weight: 600; margin-bottom: 20px;"
            th:text="${error}">
        </div>

        <div class="table-wrap" th:if="${rows != null and !rows.isEmpty()}">
            <table>
                <thead>
                    <tr>
                        <th>SR</th>
                        <th>Step / Process</th>
                        <th>Responsible</th>
                        <th>Target Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${rows}">
                        <td th:text="${row['sr']}">1</td>
                        <td th:text="${row['stepProcess']}">-</td>
                        <td th:text="${row['responsiblePerson']}">-</td>
                        <td th:text="${row['targetDate']}">-</td>
                        <td>
                            <span class="status-badge"
                                th:classappend="${row['status'] == 'Completed' ? 'status-completed' : ''}"
                                th:text="${row['status']}">Pending</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="margin-top:30px;display:flex;justify-content:flex-end;gap:12px;">
            <a th:href="@{/employee/order-entry(folderId=${config.id})}" style="display:inline-flex;align-items:center;gap:8px;background:#e5ebf3;
                      color:#5c6b7a;padding:10px 22px;border-radius:10px;font-weight:600;font-size:14px;
                      text-decoration:none;font-family:'Poppins',sans-serif;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
                Back
            </a>
            <a th:href="@{/employee/planning-edit(folderId=${config.id},planOrderId=${planOrderId})}"
                style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1f5fbf,#0aa6a6);
                      color:white;padding:10px 22px;border-radius:10px;font-weight:600;font-size:14px;
                      text-decoration:none;font-family:'Poppins',sans-serif;box-shadow:0 4px 14px rgba(31,95,191,0.3);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                Edit Planning
            </a>
        </div>
    </div>
</body>

</html>
